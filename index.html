<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Viviana</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scroll-container">
        <!-- Section 1 -->
        <section class="scroll-section">
            <video class="bg-video" src="assets/scroll1.mp4" autoplay muted loop playsinline></video>
        </section>

        <!-- Section 2 -->
        <section class="scroll-section">
            <video class="bg-video" src="assets/scroll2.mp4" autoplay muted loop playsinline></video>
            <!-- Transparent button for Maps -->
            <!-- Puedes ajustar el top, left, width y height en style.css (.maps-btn) para que encaje perfecto sobre el botón del video -->
            <a href="https://maps.app.goo.gl/KLkSQvec9exXT1Zf7" target="_blank" class="transparent-btn maps-btn"></a>
        </section>

        <!-- Section 3 -->
        <section class="scroll-section">
            <video class="bg-video" src="assets/scroll3.mp4" autoplay muted loop playsinline></video>
        </section>

        <!-- Section 4 -->
        <section class="scroll-section">
            <video class="bg-video" src="assets/scroll4.mp4" autoplay muted loop playsinline></video>
            <!-- Transparent button for WhatsApp -->
            <!-- Puedes ajustar el top, left, width y height en style.css (.whatsapp-btn) -->
            <a href="https://wa.me/000" target="_blank" class="transparent-btn whatsapp-btn"></a>
        </section>

        <!-- Section 5 -->
        <section class="scroll-section">
            <video class="bg-video" src="assets/scroll5.mp4" autoplay muted loop playsinline></video>
            
            <!-- Countdown Timer -->
            <div class="countdown-container">
                <div class="countdown-title">Faltan</div>
                <div class="countdown-timer" id="countdown">
                    <div class="time-box">
                        <span id="days">00</span>
                        <span class="label">Días</span>
                    </div>
                    <div class="time-box">
                        <span id="hours">00</span>
                        <span class="label">Horas</span>
                    </div>
                    <div class="time-box">
                        <span id="minutes">00</span>
                        <span class="label">Min</span>
                    </div>
                    <div class="time-box">
                        <span id="seconds">00</span>
                        <span class="label">Seg</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
